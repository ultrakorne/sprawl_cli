# goreleaser config — stub. Fill in before the first real release:
#   - homebrew tap owner/repo
#   - scoop bucket
#   - github repo owner/name (inferred from the module path if unset)
#
# Two binaries from one repo: prod (`sprawl`) and dev (`sprawl_dev`).
# Only the ldflag values differ. Keep this in sync with the Makefile.

version: 2

project_name: sprawl

before:
  hooks:
    - go mod tidy

builds:
  - id: sprawl
    binary: sprawl
    main: ./cmd/sprawl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/ultrakorne/sprawl_cli/internal/build.APIURL=https://sprawl.up.railway.app
      - -X github.com/ultrakorne/sprawl_cli/internal/build.AppName=sprawl
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Version={{.Version}}
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Commit={{.ShortCommit}}
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  - id: sprawl_dev
    binary: sprawl_dev
    main: ./cmd/sprawl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/ultrakorne/sprawl_cli/internal/build.APIURL=http://localhost:4000
      - -X github.com/ultrakorne/sprawl_cli/internal/build.AppName=sprawl_dev
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Version={{.Version}}
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Commit={{.ShortCommit}}
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: sprawl
    ids: [sprawl]
    name_template: "sprawl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
  - id: sprawl_dev
    ids: [sprawl_dev]
    name_template: "sprawl_dev_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

