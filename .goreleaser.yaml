# goreleaser config. Releases the prod `sprawl` binary only — `sprawl_dev`
# is built from source via `make build-dev` and is never published.
# Keep ldflags in sync with the Makefile.
#
# Still to wire up before distribution beyond GitHub releases:
#   - homebrew tap (see commented `brews:` block below)
#   - scoop bucket, if we target Windows

version: 2

project_name: sprawl

before:
  hooks:
    - go mod tidy

builds:
  - id: sprawl
    binary: sprawl
    main: ./cmd/sprawl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/ultrakorne/sprawl_cli/internal/build.APIURL=https://sprawl.today
      - -X github.com/ultrakorne/sprawl_cli/internal/build.AppName=sprawl
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Version={{.Version}}
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Commit={{.ShortCommit}}
      - -X github.com/ultrakorne/sprawl_cli/internal/build.Date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: sprawl
    ids: [sprawl]
    name_template: "sprawl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: ultrakorne
    name: sprawl_cli

